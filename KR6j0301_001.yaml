body:
  text: 隋天竺三藏闍那崛多譯如是我聞一時婆伽婆在逋多羅山頂觀世音宮殿所居之處於彼山中多有娑羅波樹多摩羅樹瞻蔔華樹阿提目多迦華樹等更有種種無量無邊諸雜寶樹周匝莊嚴與大比丘衆八千人俱復有無量首陀會天無量百千左右圍繞其名曰自在天衆大自在天衆復有若干大梵天王及諸天子請佛説法爾時觀世音菩薩摩訶薩於是海會大衆之中即從座起整理衣服偏袒右肩右膝著地合掌向佛面目熙怡開顏含笑而白佛言婆伽婆於有心呪名曰不空羂索王我於往昔從發菩提心已來過九十一劫於是劫中有世界名曰觀視於彼剎中復有一佛名曰世界王如來應正遍知然彼如來憐愍我故説此心呪我時於彼佛世尊所受持不忘以是力故從是已來常為無量無邊百千摩醯首羅諸大天衆淨居天王并諸天子無量無邊説法教化令向阿耨多羅三藐三菩提世尊我於彼佛所得是呪已即得不忘智勝莊嚴等一萬三昧世尊隨有此心呪處當知彼處有大天衆所謂自在天大自在天大梵天梵天等一萬二千守攝防護世尊隨其所在有是呪處應如塔想世尊隨何方面有是心呪應當證知彼諸人輩已曾供養百千萬億那由他諸佛種諸善根世尊若復有人聞此不空心呪者當知彼人若於往昔於他人所行諸穢惡造諸非法毀謗諸師毀謗正法未來世必墮阿鼻地獄一切諸佛菩薩聲聞辟支佛等皆悉捨離彼人於後生悔恨心不復造惡彼人若能一日一夜斷食誦此心呪彼人重罪現世輕受或一日間得寒熱病或復二日或復三日或復四日或復七日得寒熱病或復眼痛或得耳痛或脣齒疼痛或舌齶疼痛或復心痛或復腹痛或膝痛或脅痛腰脊肋痛或患支節疼痛或得痔病或大小便利不通或下痢或患手足或頭痛或患瘡癬或患白癩大癩甘瘡疱瘡反華瘡惡毒瘡月食瘡或得羊癲諸鬼病等或值呪咀野道種種言説或為他作而反著之或為已作而更著之或被枷禁繫在牢獄或被他打或被他殺或他期剋罵詈毀辱或被誹謗世尊我今略説或值身口意業逼切或夜得惡夢以現受故彼等惡業悉得除滅況復清淨諸衆生輩正信正行不滅罪者無有是處世尊若有四輩人民等設以諂曲心聞此呪者或復讀誦或復受持或晝夜常誦或為他解説已教令聽聞乃至在畜生前説此心呪令彼耳聞復能説是金剛句等自心念言金剛句者何等是也所謂一切不捨是也一切不分別是也一切無為是也一切不遲至是也一切不作是也一切不染是也一切平等心是也一切無至是也一切不棄捨是也一切不離五陰是也如是方便當須念佛彼等諸人十方諸佛數滿一千在於現前彼等諸佛當教是人懺悔除罪世尊我今略説若復有人以竹帛書是心呪受持禮拜有如是等無量無邊功德之聚世尊我今略説聞此呪者不應起諍世尊若人共他鬪諍聞此呪者或為驚怖大家或護他意或因調戲聞此呪者世尊彼等諸人應當思惟令我耳根聞此呪者以觀世音菩薩威神力故非我自力世尊譬如有人或取栴檀香或取龍腦香或取麝香等種種諸香誹謗毀辱罵詈言説誹謗毀辱罵詈言訖已還以是香塗其身體然彼栴檀乃至麝香不作是念彼人誹謗我罵詈我毀辱我豈有是心我與彼香不與彼耶無有是處世尊但彼自有香性不捨本性如是如是世尊若有人於我此心呪或復毀辱或復道説誹謗乃至如上所説以諂曲之心恭敬尊重世尊彼諂曲衆生於未來世於諸善根能為佛因生生處處不離戒定及勝智慧成就福聚之香於未來世能持戒香世尊若善男子善女人或比丘比丘尼優婆塞優婆夷或餘人輩為此心呪故於月八日十四日十五日空腹一日一夜莫食身持禁戒心行精進一日七遍夜復七遍誦此心呪已莫念餘事莫共他語世尊彼人現世得二十種功德何等為二十種功德一者一切病痛不惱其身雖有病痛以福業力故速得除差二者其身微妙柔軟光澤多人愛敬三者諸根調伏四者大得財寶所求隨稱不被他劫奪五者火不能燒六者水不能漂七者王不能奪凡所造業常得吉利八者惡雹不傷惡龍攝毒九者不被災旱不畏惡風疾雨十者若人被蟲食於禾稼當取其沙灰水等任意呪之七遍八方結界上下諸方普遍結之一切驚怖一切蟲毒即得除滅十一者一切惡鬼吸人精氣或於夢中為人夫婦欲相厭魅亦不能害十二者於一切惡衆生所常得安樂心恆敬重無時暫捨十三者若有諸怨生於惡意欲來讐對亦自消滅十四者但有惡人欲相害者不能為害即自去離十五者一切呪詛一切蠱道速即自攝不能加害十六者若處於衆中最強十七者諸有煩惱不能纏繞十八者當在陳敵鋒刃相害一心誦呪一切刀杖箭矢即不著身十九者一切善神常隨擁護二十者生生處處常得不離慈悲喜捨世尊若人能受持如是心呪者當得如是二十種功德世尊更復有得八種法一者命終之日觀世音菩薩當作比丘像現其人前二者命終之時心不散亂四大安隱無諸苦惱紛繞其身三者病雖困篤亦無諸漏泄穢污屎尿不淨四者命終之日得正憶念心不亂錯五者命終之日不復覆面而死六者命終之日得無量辨才七者命終之日欲樂生何佛國土者隨意往生八者常得善知識不相捨離是故八種福相現其人前若有人能一日三時誦念一時三遍受持此呪者當斷酒肉五辛則所得功德日夜增長菩薩不自為已知諸衆生心性力故當為説之勿為慳吝勿作憍嫉或云我能為汝汝不能耶所以者何菩薩捨嫉妬意為諸衆生作大利益而取菩提入菩薩數言菩提者即是大智言衆生者即是方便此二法者為衆生故而有所得世尊願佛聽我説此心呪於如來前欲演説故亦為四部諸衆生輩得安樂故得利益故更為自餘罪惡衆生除滅罪故爾時世尊告觀世音菩薩言汝清淨衆生説是心呪應當知時如來隨喜此心呪者於未來世行菩薩行善男子善女人於此心呪當作父母想爾時觀世音菩薩摩訶薩瞻覩尊顏目不暫捨而白佛言世尊佛已聽我説此心呪一切菩薩所應禮拜恭敬尊重此解脫圓滿法門為衆多人得利益故得安樂故為欲憐愍衆多人故為諸天人世間得世樂故我今頂禮三世一切諸佛及菩薩僧去來現在聲聞緣覺我今頂禮正行正向一切諸聖我今頂禮大智舍利弗我今頂禮彌勒世尊菩薩衆等我今頂禮本師阿彌陀如來我今頂禮常住三寶敬禮觀世音菩薩摩訶薩大慈悲者而説呪曰多姪他一唵吽二這囉這囉三支唎支唎四朱嚧朱嚧五摩訶迦𠺕尼迦六悉唎悉唎七之唎之唎八毗唎毗唎九鉢頭摩訶薩多十哥羅哥羅十一吉利吉利十二句盧句盧十三摩呵舒大薩多婆十四佛著耶佛著耶十五陀婆陀婆十六吉膩吉膩十七鉢囉二合摩舒大薩多婆十八迦囉迦囉十九吉唎吉唎二十句嚧句嚧二十一摩訶薩他莫鉢羅二合鉢多二十二這邏這邏二十三毗遮囉二十四珊遮囉二十五鉢囉二合遮囉二十六伊吒吒伊吒吒二十七婆囉婆囉二十八毗唎毗唎二十九哹嚧哹嚧三十伊醯夷醯三十一摩呵迦𠺩尼迦三十二摩呵鉢遮鉢帝鞞沙建囉三十三娑囉娑囉三十四柘囉柘囉三十五呵囉呵囉三十六呵呵三十七兮兮三十八烋烋三十九唵引迦娑婆囉訶去莫鞞沙達囉四十達囉達囉四十一地唎地唎四十二度嚧度嚧四十三多囉多囉四十四薩囉薩囉四十五簸囉簸囉四十六婆輕道羅婆輕道囉四十七阿囉濕迷二合室多薩呵薩囉四十八波羅帝曼地徒筆反多四十九舍𠼝囉五十十啝囉十啝囉五十一多波多波五十二婆伽槃五十三蘇摩地底夜五十四頡履屣伽拏五十五居鞞羅五十六婆囉醯眠達囉五十七頡履屣伽拏五十八啼婆伽拏五十九嚩扶夜反利至多六十遮羅拏六十一蘇嚧蘇嚧六十二朱嚧朱嚧六十三沒嚧沒嚧六十四散捺鳩摩囉六十五侯𠺩達囉六十六婆娑長婆六十七比疏𮞎檀那去大六十八頡履使那夜迦六十九蒱呼毗指多鞞沙達羅七十達囉達囉七十一地唎地唎七十二度嚧度嚧七十三他囉他囉七十四伽囉伽囉七十五夜囉夜囉七十六羅囉羅囉七十七何囉何囉七十八末囉末囉七十九拔囉拔囉八十拔囉陀夜八十一薩曼多婆盧吉多八十二毗盧吉多八十三盧雞攝啝囉八十四摩醯攝婆囉八十五慕呼慕呼八十六沒𡀔沒𡀔八十七沒夜沒夜八十八門柘門柘八十九何𡆗叉何𡆗叉莫摩姓去甲寫九十薩婆拔夷嚩九十一薩婆烏簸達囉鞞嚩九十二薩婆烏簸薩耆嚩九十三薩婆揭囉醯嚩九十四婆去馱槃達那九十五曷囉社怛九十六娑迦去囉賊九十七何祇儞火九十八憂馱迦水九十九鼻挲毒一百設薩多囉戎仗一百一簸唎摹遮迦能解脫一百二迦拏迦拏一百三吉儞吉儞一百四句𮞎句𮞎一百五遮囉遮囉一百六因地唎夜一百七婆去邏蒱澄伽一百八柘妬阿唎耶薩底夜一百九三鉢囉迦釋迦一百十多莫多莫一百十一三莫三莫一百十二莫薩莫薩莫呵耽暮一百十三安馱迦囉比馱摩那一百十四殺波囉蜜多鉢利哺囉迦一百十五彌唎彌唎一百十六吒吒吒吒一百十七茶偷嫁反茶茶茶一百十八知知知知一百十九伊尼夜折莫吃唎多一百二十鉢唎迦囉一百二十一伊醯夷醯一百二十二伊濕婆囉一百二十三哹多槃這迦一百二十四句𪠻句𪠻一百二十五波囉波囉一百二十六迦囉迦囉一百二十七迦吒迦吒一百二十八莫吒莫吒一百二十九毗輸馱比沙耶婆私儞一百三十摩訶迦流尼迦一百三十一輸毗多夜社儒波比多一百三十二何囉怛那去摩句吒摩囉達囉一百三十三薩婆腎若失邏思一百三十四吉唎多摩句吒一百三十五摩呵大蒱多一百三十六迦摩邏訖唎二合多一百三十七迦囉多邏一百三十八著那三摩著一百三十九毗木叉一百四十鉢囉二合嗛必多一百四十一婆呼薩埵珊多帝一百四十二鉢唎波柘迦一百四十三摩呵迦𪠻尼迦一百四十四薩婆羯摩拔囉那比舒馱迦一百四十五薩婆嚩地鉢邏摹這迦一百四十六薩婆薩埵娑摩攝婆索迦一百四十七南摹素妬帝一百四十八蘇波呵一百四十九此呪隨誦即成一日三時一一時中誦一百八遍能得除滅五逆重罪及諸業障燒沈水香欲結界時或呪水或呪灰或呪芥子或呪紫檀木四枚各七遍釘於四方一切瘧寒熱病作呪索誦二十一遍繫其咽下即得除愈一切諸病或呪酥或呪油或呪水各二十一遍呪已服之若欲破他所作呪咀作其人形像或麵或埿或蠟當以鑌鐵為刀段段割之若有人驚怖欲護身者當作呪索帶於身上若有人患腹痛呪鹹水服之若有人被蟲毒或被蛇螫當用塗呪塗之若有人患眼痛取白綖為呪索繫其耳上若人患齒取迦羅毗羅木呪二十一遍然後嚼之揩磨其齒欲作大界取五色綖呪二十一遍取紫檀木四枚為橛繫索於橛上纏之釘著四角即成大界一者怖處一切驚處欲護身者當作呪索帶行或呪水灑之或呪灰用散其上若有鬼著取五色綖為呪索帶之或繫身體一切寒熱病者取白綖呪二十一遍作索帶行若有得一切種種惡瘡取蓽茇搗以為末和蜜呪二十一遍泥其瘡上若有人患眼取香湯或甘草湯呪二十一遍洗兩眼若有人患耳煮油呪二十一遍內著耳中一切鬪諍一切官府一切恐怖處取水呪二十一遍洗其面若國內有大疫病或城邑聚落乃至家內當作道場牛糞塗地香湯灑地於四角處安置新淨水瓶以種種華置其瓶裏復將種種華散道場處持種種飲食皆令香美復以種種淨草敷設道場以食置上并諸果蓏於四角處麵作燈盞淨布作炷燒諸妙香以最勝上者而作供養其呪師以香湯澡浴著鮮淨衣於其座上敷新淨褥而坐其上誦持此呪一切災變即得消滅若有遇重病者將彼瓶水呪已灑於彼人凡所灑者即得除滅一切疫病諸鬼祟者一切有怖畏處以水灑之皆得除愈若有人被他禁呪磨栴檀呪二十一遍泥其心上即得除愈若欲除滅一切業障及五逆四重常誦莫住若有家內遇疫病或復諸鬼擾亂其家當取一百八枚蓮華一一蓮華各呪一遍擲著火中即得除愈若欲取一切衆生心意當取栴檀一百八枚長二寸一枚一遍呪之擲著火中欲治一切鬼病恐怖之處當取闍耶草藉草根毗闍耶草藥那句利藥揵陀那句梨草藥這憐尼草藥阿婆耶波儞草藥因陀羅波尼草香附子多迦羅香斫迦羅香摩訶斫迦羅香毗疏𮞎揵多香蘇摩羅是梔子蘇難陀草如是諸草皆搗之作末細羅之取水和為丸如大棗呪一百八遍或頭戴或繫手而行一切鬼病一切疫病不能為害若有小兒著鬼病及疫病所驚怖處將一丸繫於咽下若有女人薄相難嫁娶者或有諸病取此丸藥和水澡浴即除惡相最妙最勝隨意無難若有女人不生男者持藥一丸繫其項即得産男一切驚怖中皆作大護若有人被蟲者此藥亦能破之帶藥行者不被火燒諸難若被惡瘡持此藥塗者即得除差若有人為諸惡事逼切帶此藥者即蒙除難若有人欲除惡風惡雨呪水二十一遍散於四方即得除止若遇大雹取一樹枝行呪遙打之此觀世音心呪雖不受持但誦能破一切業障能成一切事皆得成就若有人持此呪者彼人當織一白㲲闊五尺長一丈不得割斷綜縷彼㲲當畫作一佛綵色中不得用膠當和香及乳和綵色畫之右邊畫作觀世音像狀如摩醯首羅天頭上髮悉如蠡髻方作華冠肩上當畫作黑鹿皮覆左肩上自餘身分當畫作種種瓔珞其畫者教持八關齋勿得雜食日別香湯清淨澡浴著淨衣裳其持呪者當清淨處安像像前以牛糞塗地四方齊整縱廣丈六尺其壇場裏散純白華置八水瓶各受一斗皆令新淨盛以香湯復以種種華置其瓶內安其淨草立八草座處安置八方作八分食置其草座上然後更以六十四分食各各種種雜美好者自餘雜食具皆廣大羅列作之唯除五辛酒肉餘但使可得之者皆悉具之若欲呪者當三日三夜斷食燒沈水香其持呪人以妙香湯三時澡洗大小便時皆須澡浴若不能三日三夜者但一日一夜斷食當食三種白食乳酪粳米在彼像前長跪設飲食已當誦呪一千八遍爾時行者在於像前即見自身出大光明猶如火焰既自見已生大歡欣乃至觀世音菩薩自來現身隨其心願皆悉與之若欲隱身當取雌黃或石黛搗令碎末精細羅之在於像前呪一千八遍塗於眼上即得隱身乃至騰空飛行復得三昧名不空智見在莊嚴作如是法已然後凡所作者皆得成就此是持呪法我今説竟爾時佛説此經已時觀世音菩薩摩訶薩及淨居諸天子娑婆世界主大梵天王及諸菩薩衆諸聲聞衆一切大衆人民聞觀世音菩薩對佛説此經皆大歡喜奉行
